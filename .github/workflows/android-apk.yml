name: Build Android APK

# Builds a debug APK in the cloud (GitHub's runners have the Android SDK), so you
# get a downloadable APK without installing Android Studio. Run it from the
# Actions tab ("Run workflow"), or it runs on every push to main. When it finishes,
# download the "tally-debug-apk" artifact and side-load it onto an Android phone
# (enable "Install unknown apps" for your browser/files app first).

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build the web app
        run: npm run build

      - name: Add / sync the Android project
        run: |
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tally-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
